<svg width="960" height="660" viewBox="0 0 960 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Retrieval-Augmented Defense pipeline</title>
  <desc id="desc">A diagram showing input prompts moving through retrieval, reranking, extraction, classification, voting, and thresholding.</desc>
  <rect width="960" height="660" rx="8" fill="#F4F7F5"/>
  <rect x="40" y="40" width="880" height="580" rx="8" fill="#FFFFFF" stroke="#D4DDD8" stroke-width="2"/>

  <text x="80" y="96" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Retrieval-Augmented Defense</text>
  <text x="80" y="130" fill="#5F625F" font-family="Inter, Arial, sans-serif" font-size="18">Known attack evidence guides detection without retraining the target model.</text>

  <rect x="80" y="180" width="190" height="112" rx="8" fill="#EEF4F1" stroke="#D4DDD8" stroke-width="2"/>
  <text x="108" y="222" fill="#126C67" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Input prompt</text>
  <text x="108" y="252" fill="#171717" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">x</text>

  <path d="M286 236H344" stroke="#8F8774" stroke-width="3" stroke-linecap="round"/>
  <path d="M344 236L332 226V246L344 236Z" fill="#8F8774"/>

  <rect x="360" y="164" width="240" height="144" rx="8" fill="#EAF5F2" stroke="#A9CEC8" stroke-width="2"/>
  <text x="392" y="208" fill="#0A433F" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Retrieve + Rerank</text>
  <text x="392" y="240" fill="#244B48" font-family="Inter, Arial, sans-serif" font-size="15">Select similar jailbreak</text>
  <text x="392" y="264" fill="#244B48" font-family="Inter, Arial, sans-serif" font-size="15">examples and strategies</text>

  <rect x="652" y="118" width="188" height="236" rx="8" fill="#FFF6E2" stroke="#E8C47B" stroke-width="2"/>
  <text x="684" y="160" fill="#9A640D" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Attack database</text>
  <rect x="684" y="190" width="124" height="20" rx="4" fill="#E8C47B"/>
  <rect x="684" y="224" width="92" height="20" rx="4" fill="#DFAE52"/>
  <rect x="684" y="258" width="134" height="20" rx="4" fill="#C7861B"/>
  <rect x="684" y="292" width="106" height="20" rx="4" fill="#A86D12"/>

  <path d="M652 236H616" stroke="#C7861B" stroke-width="3" stroke-linecap="round"/>
  <path d="M616 236L628 226V246L616 236Z" fill="#C7861B"/>

  <path d="M480 326V376" stroke="#8F8774" stroke-width="3" stroke-linecap="round"/>
  <path d="M480 376L470 364H490L480 376Z" fill="#8F8774"/>

  <rect x="248" y="392" width="464" height="116" rx="8" fill="#F3EDF1" stroke="#CDAABE" stroke-width="2"/>
  <text x="290" y="434" fill="#6E314F" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Extract + Classify + Vote</text>
  <text x="290" y="466" fill="#52313F" font-family="Inter, Arial, sans-serif" font-size="15">Infer the underlying query, identify strategy,</text>
  <text x="290" y="490" fill="#52313F" font-family="Inter, Arial, sans-serif" font-size="15">and estimate P(harmful | x).</text>

  <path d="M712 450H774" stroke="#8F8774" stroke-width="3" stroke-linecap="round"/>
  <path d="M774 450L762 440V460L774 450Z" fill="#8F8774"/>

  <rect x="790" y="392" width="90" height="116" rx="8" fill="#EEF4EA" stroke="#9EBF9B" stroke-width="2"/>
  <text x="817" y="432" fill="#3F6B3F" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">tau</text>
  <text x="813" y="464" fill="#2C4D2C" font-family="Inter, Arial, sans-serif" font-size="14">block</text>
  <text x="812" y="486" fill="#2C4D2C" font-family="Inter, Arial, sans-serif" font-size="14">or pass</text>

  <rect x="80" y="548" width="800" height="34" rx="6" fill="#171717"/>
  <text x="110" y="571" fill="#FFFDF8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Controllable operating point: choose a threshold to balance safety against benign refusals.</text>
</svg>
